<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>잔디보호매트 규격 조회</title>
<meta property="og:title" content="잔디보호매트 규격 조회">
<meta property="og:description" content="두께를 입력하면 일치하는 잔디보호매트 제품을 찾아드립니다">
<meta property="og:type" content="website">
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap');

:root{
  --bg:#161f19;
  --bg-grid: rgba(237,239,234,0.045);
  --surface:#1f2b23;
  --surface-2:#26362c;
  --line: rgba(237,239,234,0.10);
  --ink:#e9ede6;
  --ink-dim:#a9b6ac;
  --moss:#8fb571;
  --moss-dim:#5d7a4c;
  --stamp:#b5442e;
  --stamp-dim:#7a3324;
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:
    linear-gradient(var(--bg-grid) 1px, transparent 1px) 0 0/100% 34px,
    linear-gradient(90deg, var(--bg-grid) 1px, transparent 1px) 0 0/34px 100%,
    var(--bg);
  color:var(--ink);
  font-family:'Pretendard', -apple-system, sans-serif;
  min-height:100vh;
  padding:36px 18px 80px;
}

.page{max-width:760px;margin:0 auto;}

header{
  border-bottom:1px solid var(--line);
  padding-bottom:20px;
  margin-bottom:28px;
  display:flex;
  justify-content:space-between;
  align-items:flex-end;
  gap:16px;
}
.eyebrow{
  font-family:'JetBrains Mono',monospace;
  font-size:11px;
  letter-spacing:.14em;
  color:var(--moss);
  text-transform:uppercase;
  margin:0 0 8px;
}
h1{
  font-size:26px;
  margin:0;
  font-weight:700;
  letter-spacing:-0.01em;
}
.subtitle{
  color:var(--ink-dim);
  font-size:13.5px;
  margin-top:6px;
  line-height:1.5;
}
.doc-no{
  font-family:'JetBrains Mono',monospace;
  font-size:11px;
  color:var(--ink-dim);
  text-align:right;
  line-height:1.7;
  white-space:nowrap;
}

.search-panel{
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:4px;
  padding:22px 22px 18px;
  margin-bottom:10px;
  position:relative;
}
.search-panel label{
  display:block;
  font-size:11.5px;
  letter-spacing:.06em;
  color:var(--ink-dim);
  margin-bottom:10px;
}
.input-row{
  display:flex;
  align-items:center;
  gap:14px;
}
#specInput{
  flex:1;
  background:transparent;
  border:none;
  border-bottom:1.5px solid var(--moss-dim);
  color:var(--ink);
  font-family:'JetBrains Mono',monospace;
  font-size:28px;
  font-weight:500;
  padding:6px 2px 10px;
  outline:none;
  letter-spacing:.02em;
  min-width:0;
}
#specInput::placeholder{color:#4a5a4e; font-weight:400;}
#specInput:focus{border-bottom-color:var(--moss);}

.dim-svg{flex-shrink:0;}

.hint{
  font-size:12px;
  color:var(--ink-dim);
  margin-top:12px;
  display:flex;
  gap:18px;
  flex-wrap:wrap;
}
.hint b{color:var(--moss); font-weight:600;}

.section-label{
  font-family:'JetBrains Mono',monospace;
  font-size:11px;
  letter-spacing:.1em;
  color:var(--ink-dim);
  text-transform:uppercase;
  margin:30px 0 12px;
  display:flex;
  align-items:center;
  gap:10px;
}
.section-label::after{
  content:'';
  flex:1;
  height:1px;
  background:var(--line);
}

#results{display:flex; flex-direction:column; gap:10px;}
.empty-msg{
  color:var(--ink-dim);
  font-size:13px;
  padding:30px 4px;
  text-align:center;
  border:1px dashed var(--line);
  border-radius:4px;
}

.card{
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:4px;
  padding:16px 18px;
  display:flex;
  gap:16px;
  align-items:flex-start;
  position:relative;
  overflow:hidden;
}
.card.near{border-style:dashed; opacity:.86;}
.card-dim{flex-shrink:0; padding-top:2px;}

.thumb{
  flex-shrink:0;
  width:64px; height:64px;
  border-radius:4px;
  border:1px solid var(--line);
  background:var(--surface-2);
  cursor:pointer;
  overflow:hidden;
  position:relative;
}
.thumb img{
  width:100%; height:100%;
  object-fit:cover;
  display:block;
  transition:transform .2s ease;
}
.thumb:hover img{transform:scale(1.06);}
.thumb.placeholder{
  cursor:default;
  display:flex;
  align-items:center;
  justify-content:center;
  border-style:dashed;
}
.thumb.placeholder span{
  font-size:9.5px;
  color:var(--ink-dim);
  text-align:center;
  line-height:1.3;
  padding:0 4px;
}

.lightbox{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(10,14,11,0.92);
  z-index:100;
  align-items:center;
  justify-content:center;
  padding:40px 20px;
  cursor:zoom-out;
}
.lightbox.open{display:flex;}
.lightbox img{
  max-width:min(88vw, 720px);
  max-height:82vh;
  object-fit:contain;
  border-radius:6px;
  box-shadow:0 20px 60px rgba(0,0,0,0.5);
}
.lightbox-caption{
  position:absolute;
  bottom:24px;
  left:0; right:0;
  text-align:center;
  color:var(--ink-dim);
  font-family:'JetBrains Mono',monospace;
  font-size:12px;
}
.lightbox-close{
  position:absolute;
  top:18px; right:22px;
  color:var(--ink-dim);
  font-family:'JetBrains Mono',monospace;
  font-size:13px;
  cursor:pointer;
}

.card-main{flex:1; min-width:0;}
.card-top{
  display:flex;
  justify-content:space-between;
  align-items:baseline;
  gap:10px;
  flex-wrap:wrap;
}
.prod-name{
  font-size:16px;
  font-weight:700;
  letter-spacing:-.01em;
}
.prod-spec{
  font-family:'JetBrains Mono',monospace;
  font-size:13px;
  color:var(--moss);
  white-space:nowrap;
}
.tag-row{display:flex; gap:6px; flex-wrap:wrap; margin-top:8px;}
.tag{
  font-size:11px;
  padding:2px 8px;
  border-radius:20px;
  border:1px solid var(--line);
  color:var(--ink-dim);
  white-space:nowrap;
}
.company-tag{
  font-size:11.5px;
  font-weight:600;
  padding:2px 9px;
  border-radius:3px;
}
.tag-excellent{
  background:var(--moss);
  color:#12190f;
  border-color:var(--moss);
  font-weight:700;
}
.tag-innovation{
  background:#6cc2e8;
  color:#0d2530;
  border-color:#6cc2e8;
  font-weight:700;
}
.meta-row{
  display:flex;
  gap:16px;
  margin-top:9px;
  font-size:12px;
  color:var(--ink-dim);
  flex-wrap:wrap;
}
.meta-row span b{color:var(--ink); font-weight:500;}
.price-row{
  display:flex;
  gap:8px;
  margin-top:9px;
  flex-wrap:wrap;
  align-items:center;
}
.price-chip{
  font-size:12px;
  color:var(--ink-dim);
  background:var(--surface-2);
  border-radius:3px;
  padding:3px 9px;
}
.price-chip b{color:var(--moss); font-weight:600;}
.price-chip.venture{border:1px solid var(--moss-dim); background:transparent;}
.price-chip.venture b{color:#c9b56a;}
.price-chip.innovation{border:1px solid #4a8ca8; background:transparent;}
.price-chip.innovation b{color:#6cc2e8;}
.diff-tag{
  font-family:'JetBrains Mono',monospace;
  font-size:10.5px;
  margin-left:4px;
  padding:1px 5px;
  border-radius:3px;
}
.diff-tag.base{color:var(--ink-dim); border:1px solid var(--line);}
.diff-tag.up{color:#6cc2e8; background:rgba(108,194,232,0.14);}
.diff-tag.down{color:var(--stamp); background:rgba(181,68,46,0.14);}
.dday{
  font-family:'JetBrains Mono',monospace;
  font-size:11px;
  color:var(--moss);
  border:1px solid var(--moss-dim);
  border-radius:3px;
  padding:3px 9px;
}
.dday.urgent{color:var(--stamp); border-color:var(--stamp-dim);}
.note{
  margin-top:8px;
  font-size:12px;
  color:var(--ink-dim);
  border-left:2px solid var(--line);
  padding-left:8px;
}
.diff-badge{
  position:absolute;
  top:0; right:0;
  font-family:'JetBrains Mono',monospace;
  font-size:10.5px;
  color:var(--ink-dim);
  background:var(--surface-2);
  padding:3px 9px 3px 11px;
  border-bottom-left-radius:6px;
}

.browse-groups{display:flex; flex-direction:column; gap:16px;}
.browse-group{
  border:1px solid var(--line);
  border-radius:4px;
  padding:12px 16px;
}
.browse-head{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:8px;
}
.browse-count{font-size:11px; color:var(--ink-dim); font-family:'JetBrains Mono',monospace;}
.browse-chips{display:flex; flex-wrap:wrap; gap:6px;}
.chip{
  font-family:'JetBrains Mono',monospace;
  font-size:11.5px;
  padding:4px 9px;
  background:var(--surface-2);
  border-radius:3px;
  color:var(--ink-dim);
}
.chip b{color:var(--ink); font-weight:500;}

footer{
  margin-top:40px;
  padding-top:16px;
  border-top:1px solid var(--line);
  font-size:11px;
  color:var(--ink-dim);
  font-family:'JetBrains Mono',monospace;
  display:flex;
  justify-content:space-between;
  flex-wrap:wrap;
  gap:8px;
}

@media (max-width: 640px){
  body{
    padding:20px 12px 60px;
    background-size:100% 26px, 26px 100%;
  }
  header{
    flex-direction:column;
    align-items:flex-start;
    gap:10px;
    padding-bottom:16px;
    margin-bottom:20px;
  }
  .doc-no{text-align:left;}
  h1{font-size:21px;}
  .subtitle{font-size:12.5px;}

  .search-panel{padding:16px 14px 14px;}
  .input-row{gap:8px;}
  #specInput{font-size:20px; padding:4px 2px 8px;}
  .dim-svg{width:52px; height:40px;}
  .hint{flex-direction:column; gap:6px; font-size:11.5px;}

  .card{padding:13px 12px; gap:10px;}
  .card-dim{display:none;}
  .thumb{width:48px; height:48px;}
  .thumb.placeholder span{font-size:8px;}
  .prod-name{font-size:14.5px;}
  .prod-spec{font-size:12px;}
  .stamp{width:44px; height:44px; font-size:8px; top:8px; right:10px;}
  .meta-row{gap:10px 14px; font-size:11.5px;}
  .diff-badge{font-size:10px; padding:2px 7px 2px 9px;}

  .browse-group{padding:10px 12px;}
  .chip{font-size:11px; padding:3px 7px;}

  footer{flex-direction:column; gap:4px;}
}
</style>

const BASELINE = { name:"키그린 KG-M500", delivery:38000, install:46200 };

function priceDiff(value, baseline){
  if(value===baseline) return `<span class="diff-tag base">기준</span>`;
  const d = value - baseline;
  const sign = d > 0 ? '+' : '−';
  return `<span class="diff-tag ${d>0?'up':'down'}">${sign}${Math.abs(d).toLocaleString()}원</span>`;
}

const specInput = document.getElementById('specInput');
const resultsEl = document.getElementById('results');
const sectionLabel = document.getElementById('section-label');
const dimSvg = document.getElementById('dimSvg');

function parseNums(str){
  return str
    .replace(/[Tt]/g,'')
    .split(/[x×X*\/,\s]+/)
    .map(s=>s.trim())
    .filter(s=>s.length>0)
    .map(Number)
    .filter(n=>!isNaN(n) && n>0);
}

function dimDiagram(nums){
  if(!nums || nums.length===0){ dimSvg.innerHTML=''; return; }
  const w = nums[0]||0, d = nums[1]||0, t = nums[2]||0;
  let svg = '';
  const stroke = 'var(--moss-dim)';
  if(nums.length>=2){
    svg += `<rect x="10" y="8" width="34" height="26" fill="none" stroke="${stroke}" stroke-width="1.4"/>`;
    svg += `<line x1="10" y1="4" x2="44" y2="4" stroke="${stroke}" stroke-width="1"/>`;
    svg += `<line x1="6" y1="8" x2="6" y2="34" stroke="${stroke}" stroke-width="1"/>`;
  } else {
    svg += `<rect x="10" y="8" width="34" height="26" fill="none" stroke="${stroke}" stroke-width="1" stroke-dasharray="2,2"/>`;
  }
  if(nums.length>=3 || nums.length===1){
    const tVal = nums.length>=3 ? t : nums[0];
    svg += `<rect x="52" y="14" width="10" height="14" fill="var(--moss-dim)" opacity="0.5"/>`;
    svg += `<text x="57" y="46" font-size="8" fill="var(--ink-dim)" text-anchor="middle" font-family="JetBrains Mono">T</text>`;
  }
  dimSvg.innerHTML = svg;
}

function ddayLabel(dateStr){
  const p = dateStr.split('.').map(Number);
  const end = new Date(p[0], p[1]-1, p[2]);
  const now = new Date();
  now.setHours(0,0,0,0);
  const diff = Math.ceil((end-now)/(1000*60*60*24));
  if(diff < 0) return {text:'계약만료', urgent:true};
  if(diff === 0) return {text:'오늘 만료', urgent:true};
  return {text:`D-${diff}`, urgent: diff<=60};
}

function renderCard(item, diffTag){
  const dimsStr = item.dims ? item.dims.join(' × ') : '규격 수치 없음';
  const thumbHtml = item.image
    ? `<div class="thumb" onclick="openLightbox('${item.image}','${item.name.replace(/'/g,"\\'")}')"><img src="${item.image}" alt="${item.name}" onerror="this.parentElement.outerHTML='<div class=&quot;thumb placeholder&quot;><span>이미지<br>없음</span></div>'"></div>`
    : `<div class="thumb placeholder"><span>이미지<br>없음</span></div>`;
  const visibleTypes = item.type.filter(t=>t!=='관급' && t!=='사급' && t!=='조달우수');
  const excellentCert = item.cert.includes('혁신제품') ? '혁신제품' : (item.cert.includes('우수제품') ? '우수제품' : null);
  return `
  <div class="card ${diffTag!==undefined?'near':''}">
    ${diffTag!==undefined ? `<div class="diff-badge">오차 ${diffTag}mm</div>` : ''}
    ${thumbHtml}
    <div class="card-main">
      <div class="card-top">
        <div class="prod-name">${item.company} ${item.name}</div>
        <div class="prod-spec">${dimsStr} mm</div>
      </div>
      <div class="tag-row">
        ${excellentCert ? `<span class="tag ${excellentCert==='혁신제품'?'tag-innovation':'tag-excellent'}">${excellentCert}</span>` : ''}
        ${visibleTypes.map(t=>`<span class="tag">${t}</span>`).join('')}
        ${item.cert.filter(c=>c!==excellentCert).map(t=>`<span class="tag">${t}</span>`).join('')}
      </div>
      <div class="meta-row">
        ${item.material ? `<span>소재 <b>${item.material}</b></span>` : ''}
        ${item.color ? `<span>색상 <b>${item.color}</b></span>` : ''}
        ${item.weight ? `<span>개당무게 <b>${item.weight.toLocaleString()}g</b></span>` : ''}
        ${item.id ? `<span>식별번호 <b>${item.id}</b></span>` : ''}
        ${item.regDate ? `<span>품목등록일 <b>${item.regDate}</b></span>` : ''}
      </div>
      ${(item.priceDelivery || item.priceInstall || item.priceVenture || item.priceInnovation || item.contractEnd) ? `
      <div class="price-row">
        ${item.priceDelivery ? `<span class="price-chip">하차도 <b>${item.priceDelivery.toLocaleString()}원</b> ${item.type.includes('조달우수') ? priceDiff(item.priceDelivery, BASELINE.delivery) : ''}</span>` : ''}
        ${item.priceInstall ? `<span class="price-chip">현장설치도 <b>${item.priceInstall.toLocaleString()}원</b> ${item.type.includes('조달우수') ? priceDiff(item.priceInstall, BASELINE.install) : ''}</span>` : ''}
        ${item.priceVenture ? `<span class="price-chip venture">벤처나라 <b>${item.priceVenture.toLocaleString()}원</b></span>` : ''}
        ${item.priceInnovation ? `<span class="price-chip innovation">혁신장터 <b>${item.priceInnovation.toLocaleString()}원</b></span>` : ''}
        ${item.contractEnd ? (()=>{const d=ddayLabel(item.contractEnd); return `<span class="dday ${d.urgent?'urgent':''}">${excellentCert||'우수제품'} 계약일자 ${d.text} · ${item.contractEnd}</span>`;})() : ''}
      </div>` : ''}
      ${item.note ? `<div class="note">${item.note}</div>` : ''}
    </div>
  </div>`;
}

function openLightbox(src, name){
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightboxCaption').textContent = name || '';
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox(){
  document.getElementById('lightbox').classList.remove('open');
}

function sortedCopy(arr){ return [...arr].sort((a,b)=>a-b); }
function close(a,b,tol){ return Math.abs(a-b) <= tol; }

function matchExact(nums, item){
  const tol = 0.5;
  if(nums.length===0) return false;
  if(!item.dims) return false;
  return close(nums[0], item.dims[2], tol);
}

function diffScore(nums, item){
  const d = item.dims;
  if(nums.length===3){
    const inFoot = sortedCopy(nums.slice(0,2));
    const dFoot = sortedCopy(d.slice(0,2));
    return Math.abs(inFoot[0]-dFoot[0]) + Math.abs(inFoot[1]-dFoot[1]) + Math.abs(nums[2]-d[2]);
  }
  if(nums.length===2){
    const inFoot = sortedCopy(nums);
    const dFoot = sortedCopy(d.slice(0,2));
    return Math.abs(inFoot[0]-dFoot[0]) + Math.abs(inFoot[1]-dFoot[1]);
  }
  if(nums.length===1){
    return Math.abs(nums[0]-d[2]);
  }
  return 9999;
}

function renderBrowse(){
  sectionLabel.style.display = 'none';

  function byCompanyKeygreenFirst(a,b){
    if(a.company==='키그린' && b.company!=='키그린') return -1;
    if(b.company==='키그린' && a.company!=='키그린') return 1;
    return a.company.localeCompare(b.company, 'ko');
  }

  const excellent = DATA.filter(i=>i.cert.includes('우수제품')).sort(byCompanyKeygreenFirst);
  const innovation = DATA.filter(i=>i.cert.includes('혁신제품')).sort(byCompanyKeygreenFirst);
  const venture = DATA.filter(i=>i.priceVenture).sort(byCompanyKeygreenFirst);

  function categoryChips(title, items){
    if(items.length===0) return '';
    return `<div class="section-label">${title} (${items.length})</div>
    <div class="browse-chips" style="margin-bottom:22px;">
      ${items.map(it=>`<span class="chip"><b>${it.company} ${it.name}</b> ${it.dims ? it.dims.join('×') : '규격없음'}</span>`).join('')}
    </div>`;
  }

  let html = '';
  html += categoryChips('우수제품', excellent);
  html += categoryChips('혁신제품', innovation);
  html += categoryChips('벤처나라 등록', venture);

  html += `<div class="section-label">전체 제품 (${DATA.length})</div>`;

  const groups = {};
  DATA.forEach(item=>{
    if(!groups[item.company]) groups[item.company]=[];
    groups[item.company].push(item);
  });
  html += '<div class="browse-groups">';
  const sortedCompanies = Object.keys(groups).sort((a,b)=>{
    if(a==='키그린') return -1;
    if(b==='키그린') return 1;
    return a.localeCompare(b, 'ko');
  });
  sortedCompanies.forEach(company=>{
    const cc = COMPANY_COLOR[company] || {bg:'#333',fg:'#ccc'};
    const items = groups[company];
    html += `<div class="browse-group">
      <div class="browse-head">
        <span class="company-tag" style="background:${cc.bg};color:${cc.fg}">${company}</span>
        <span class="browse-count">${items.length}종</span>
      </div>
      <div class="browse-chips">
        ${items.map(it=>`<span class="chip"><b>${it.name}</b> ${it.dims ? it.dims.join('×') : '규격없음'}</span>`).join('')}
      </div>
    </div>`;
  });
  html += '</div>';
  resultsEl.innerHTML = html;
}

function renderQuery(query){
  const nums = parseNums(query);
  dimDiagram(nums);

  if(nums.length===0){
    renderBrowse();
    return;
  }

  const exact = DATA.filter(item=>matchExact(nums,item));
  sectionLabel.style.display = 'flex';

  if(exact.length>0){
    sectionLabel.textContent = `일치하는 제품 (${exact.length})`;
    resultsEl.innerHTML = exact.map(item=>renderCard(item)).join('');
    return;
  }

  sectionLabel.textContent = `일치하는 제품 (0)`;
  resultsEl.innerHTML = `<div class="empty-msg">입력하신 규격과 정확히 일치하는 제품이 없습니다.</div>`;
}

specInput.addEventListener('input', (e)=>renderQuery(e.target.value));
renderBrowse();
dimDiagram([]);
