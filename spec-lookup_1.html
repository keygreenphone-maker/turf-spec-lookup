<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>규격 조회</title>
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap');

:root{
  --bg:#161f19;
  --bg-grid: rgba(237,239,234,0.045);
  --surface:#1f2b23;
  --surface-2:#26362c;
  --line: rgba(237,239,234,0.10);
  --ink:#e9ede6;
  --ink-dim:#a9b6ac;
  --moss:#8fb571;
  --moss-dim:#5d7a4c;
  --stamp:#b5442e;
  --stamp-dim:#7a3324;
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:
    linear-gradient(var(--bg-grid) 1px, transparent 1px) 0 0/100% 34px,
    linear-gradient(90deg, var(--bg-grid) 1px, transparent 1px) 0 0/34px 100%,
    var(--bg);
  color:var(--ink);
  font-family:'Pretendard', -apple-system, sans-serif;
  min-height:100vh;
  padding:36px 18px 80px;
}

.page{max-width:760px;margin:0 auto;}

header{
  border-bottom:1px solid var(--line);
  padding-bottom:20px;
  margin-bottom:28px;
  display:flex;
  justify-content:space-between;
  align-items:flex-end;
  gap:16px;
}
.eyebrow{
  font-family:'JetBrains Mono',monospace;
  font-size:11px;
  letter-spacing:.14em;
  color:var(--moss);
  text-transform:uppercase;
  margin:0 0 8px;
}
h1{
  font-size:26px;
  margin:0;
  font-weight:700;
  letter-spacing:-0.01em;
}
.subtitle{
  color:var(--ink-dim);
  font-size:13.5px;
  margin-top:6px;
  line-height:1.5;
}
.doc-no{
  font-family:'JetBrains Mono',monospace;
  font-size:11px;
  color:var(--ink-dim);
  text-align:right;
  line-height:1.7;
  white-space:nowrap;
}

.search-panel{
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:4px;
  padding:22px 22px 18px;
  margin-bottom:10px;
  position:relative;
}
.search-panel label{
  display:block;
  font-size:11.5px;
  letter-spacing:.06em;
  color:var(--ink-dim);
  margin-bottom:10px;
}
.input-row{
  display:flex;
  align-items:center;
  gap:14px;
}
#specInput{
  flex:1;
  background:transparent;
  border:none;
  border-bottom:1.5px solid var(--moss-dim);
  color:var(--ink);
  font-family:'JetBrains Mono',monospace;
  font-size:28px;
  font-weight:500;
  padding:6px 2px 10px;
  outline:none;
  letter-spacing:.02em;
  min-width:0;
}
#specInput::placeholder{color:#4a5a4e; font-weight:400;}
#specInput:focus{border-bottom-color:var(--moss);}

.dim-svg{flex-shrink:0;}

.hint{
  font-size:12px;
  color:var(--ink-dim);
  margin-top:12px;
  display:flex;
  gap:18px;
  flex-wrap:wrap;
}
.hint b{color:var(--moss); font-weight:600;}

.section-label{
  font-family:'JetBrains Mono',monospace;
  font-size:11px;
  letter-spacing:.1em;
  color:var(--ink-dim);
  text-transform:uppercase;
  margin:30px 0 12px;
  display:flex;
  align-items:center;
  gap:10px;
}
.section-label::after{
  content:'';
  flex:1;
  height:1px;
  background:var(--line);
}

#results{display:flex; flex-direction:column; gap:10px;}
.empty-msg{
  color:var(--ink-dim);
  font-size:13px;
  padding:30px 4px;
  text-align:center;
  border:1px dashed var(--line);
  border-radius:4px;
}

.card{
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:4px;
  padding:16px 18px;
  display:flex;
  gap:16px;
  align-items:flex-start;
  position:relative;
  overflow:hidden;
}
.card.near{border-style:dashed; opacity:.86;}
.card-dim{flex-shrink:0; padding-top:2px;}
.card-main{flex:1; min-width:0;}
.card-top{
  display:flex;
  justify-content:space-between;
  align-items:baseline;
  gap:10px;
  flex-wrap:wrap;
}
.prod-name{
  font-size:16px;
  font-weight:700;
  letter-spacing:-.01em;
}
.prod-spec{
  font-family:'JetBrains Mono',monospace;
  font-size:13px;
  color:var(--moss);
  white-space:nowrap;
}
.tag-row{display:flex; gap:6px; flex-wrap:wrap; margin-top:8px;}
.tag{
  font-size:11px;
  padding:2px 8px;
  border-radius:20px;
  border:1px solid var(--line);
  color:var(--ink-dim);
  white-space:nowrap;
}
.company-tag{
  font-size:11.5px;
  font-weight:600;
  padding:2px 9px;
  border-radius:3px;
}
.meta-row{
  display:flex;
  gap:16px;
  margin-top:9px;
  font-size:12px;
  color:var(--ink-dim);
  flex-wrap:wrap;
}
.meta-row span b{color:var(--ink); font-weight:500;}
.note{
  margin-top:8px;
  font-size:12px;
  color:var(--ink-dim);
  border-left:2px solid var(--line);
  padding-left:8px;
}
.diff-badge{
  position:absolute;
  top:0; right:0;
  font-family:'JetBrains Mono',monospace;
  font-size:10.5px;
  color:var(--ink-dim);
  background:var(--surface-2);
  padding:3px 9px 3px 11px;
  border-bottom-left-radius:6px;
}

.stamp{
  position:absolute;
  top:10px; right:14px;
  width:56px; height:56px;
  border:2px solid var(--stamp);
  border-radius:50%;
  color:var(--stamp);
  display:flex; align-items:center; justify-content:center;
  text-align:center;
  font-size:9.5px;
  font-weight:700;
  line-height:1.15;
  letter-spacing:-.02em;
  transform:rotate(-11deg);
  opacity:.85;
  mix-blend-mode:screen;
  pointer-events:none;
}
.stamp::before{
  content:'';
  position:absolute;
  inset:5px;
  border:1px solid var(--stamp);
  border-radius:50%;
}

.browse-groups{display:flex; flex-direction:column; gap:16px;}
.browse-group{
  border:1px solid var(--line);
  border-radius:4px;
  padding:12px 16px;
}
.browse-head{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:8px;
}
.browse-count{font-size:11px; color:var(--ink-dim); font-family:'JetBrains Mono',monospace;}
.browse-chips{display:flex; flex-wrap:wrap; gap:6px;}
.chip{
  font-family:'JetBrains Mono',monospace;
  font-size:11.5px;
  padding:4px 9px;
  background:var(--surface-2);
  border-radius:3px;
  color:var(--ink-dim);
}
.chip b{color:var(--ink); font-weight:500;}

footer{
  margin-top:40px;
  padding-top:16px;
  border-top:1px solid var(--line);
  font-size:11px;
  color:var(--ink-dim);
  font-family:'JetBrains Mono',monospace;
  display:flex;
  justify-content:space-between;
  flex-wrap:wrap;
  gap:8px;
}
</style>
</head>
<body>
<div class="page">

  <header>
    <div>
      <p class="eyebrow">잔디보호매트 · 제품정보 DB</p>
      <h1>규격 조회</h1>
      <div class="subtitle">치수를 입력하면 일치하는 제품을 찾아드립니다</div>
    </div>
    <div class="doc-no">REF. 19e86ab0<br>SNAPSHOT 2026.07.07</div>
  </header>

  <div class="search-panel">
    <label>규격 입력 &nbsp;(가로 × 세로 × 두께, mm)</label>
    <div class="input-row">
      <input id="specInput" type="text" placeholder="예: 500x500x30" autocomplete="off" inputmode="decimal">
      <svg class="dim-svg" id="dimSvg" width="72" height="52" viewBox="0 0 72 52"></svg>
    </div>
    <div class="hint">
      <span><b>3개 숫자</b> — 가로·세로·두께 전체 조회</span>
      <span><b>2개 숫자</b> — 가로×세로(설치 면적) 조회</span>
      <span><b>1개 숫자</b> — 두께만 조회</span>
    </div>
  </div>

  <div id="section-label" class="section-label">전체 제품 (29)</div>
  <div id="results"></div>

  <footer>
    <span>Notion · 📁 제품정보</span>
    <span id="footNote">10개 회사 · 29개 제품</span>
  </footer>
</div>

<script>
const DATA = [
{name:"FREETURF-2018-01", company:"프리터프", type:["조달우수"], dims:[500,500,30], material:"LDPE, POE", id:"23682803", cert:["우수제품"], note:null},
{name:"KPMT", company:"키그린", type:["관급","조달우수"], dims:[611,405,48], material:"HDPE", id:"24384511", cert:["우수제품","여성기업"], note:null},
{name:"KPMB", company:"키그린", type:["관급","조달우수"], dims:[616,410,41], material:"HDPE", id:"24384511", cert:["우수제품","여성기업"], note:null},
{name:"S-D", company:"키그린", type:["사급"], dims:[500,500,37], material:"EVA", id:null, cert:[], note:null},
{name:"S-S", company:"키그린", type:["사급"], dims:[500,500,31], material:"EVA", id:null, cert:[], note:null},
{name:"S-PL", company:"키그린", type:["사급"], dims:[500,500,30], material:"EVA", id:null, cert:[], note:null},
{name:"EGK-GR-5050", company:"어스그린코리아", type:["사급"], dims:[500,500,32], material:"HDPE/LDPE", id:null, cert:[], note:null},
{name:"SM-7", company:"오지에스공업", type:["관급"], dims:[500,500,25], material:null, id:"25409697", cert:[], note:null},
{name:"핀그린/PIN-GR-500", company:"금룡", type:["관급"], dims:[500,500,53], material:"EVA", id:"24673829", cert:[], note:null},
{name:"터프가드", company:"지에스티지", type:["관급"], dims:[475,475,24], material:null, id:"25232574", cert:[], note:null},
{name:"EGK-GR100-4060", company:"어스그린코리아", type:["관급","조달우수"], dims:[400,600,34], material:"HDPE", id:"23647621", cert:["우수제품","여성기업","성능인증","소기업"], note:null},
{name:"ECO-SM-7", company:"오지에스공업", type:["관급"], dims:[500,500,25], material:"생분해(EL724)", id:"25417838", cert:[], note:null},
{name:"Y3-TS Mat1000", company:"와이쓰리", type:["관급"], dims:[500,500,31], material:null, id:"25223859", cert:[], note:null},
{name:"EGK-GR-100", company:"어스그린코리아", type:["관급"], dims:[400,600,34], material:null, id:"23390341", cert:[], note:"잔디포함 55,000원 / 잔디,시공포함 65,000원"},
{name:"GB1000+GB6000", company:"한설그린", type:["사급"], dims:[500,500,72], material:"HDPE", id:null, cert:[], note:null},
{name:"그린블록파크/GB1000", company:"한설그린", type:["사급"], dims:[500,500,72], material:"HDPE", id:null, cert:[], note:null},
{name:"플러스 잔디보호매트", company:"동림이엔씨", type:["관급"], dims:[500,500,30], material:null, id:"24817304", cert:[], note:null},
{name:"GB6002", company:"한설그린", type:["관급","조달우수"], dims:[500,500,32], material:"LDPE, POE", id:"23260735", cert:["우수제품"], note:null},
{name:"GB7000", company:"한설그린", type:["사급"], dims:[333,333,10], material:"HDPE", id:null, cert:[], note:null},
{name:"그린펫트50/GB6000", company:"한설그린", type:["사급"], dims:[500,500,17], material:"HDPE", id:null, cert:[], note:null},
{name:"상부이중형 2020 EGK-GRN100-2020", company:"어스그린코리아", type:["사급"], dims:[200,200,35], material:"HDPE/TPE", id:null, cert:["LH신자재"], note:"LH신자재(2017)"},
{name:"보울트", company:"한설그린", type:["사급"], dims:[500,500,32], material:"LDPE, 연성소재", id:null, cert:[], note:null},
{name:"S-P", company:"키그린", type:["사급"], dims:[500,500,31], material:"EVA", id:null, cert:[], note:null},
{name:"S-E", company:"키그린", type:["사급"], dims:[457,457,28], material:"EVA", id:null, cert:[], note:null},
{name:"S-A", company:"키그린", type:["사급"], dims:[500,500,31], material:"EVA", id:null, cert:[], note:null},
{name:"S-L", company:"키그린", type:["사급"], dims:[333,333,30], material:"EVA", id:null, cert:[], note:null},
{name:"EGK-GR100-4040", company:"어스그린코리아", type:["관급"], dims:[400,400,30], material:"HDPE/LDPE", id:"24422058", cert:["LH신자재"], note:"LH신자재(2017)"},
{name:"KPMD", company:"키그린", type:["관급","조달우수"], dims:[616,410,48], material:"HDPE", id:"24384511", cert:["우수제품","여성기업"], note:null},
{name:"KG-M500", company:"키그린", type:["관급","조달우수"], dims:[500,500,29], material:"EVA", id:"24902279", cert:["우수제품","여성기업"], note:null},
];

const COMPANY_COLOR = {
  "한설그린":   {bg:"#3a3155", fg:"#c3b3e8"},
  "어스그린코리아": {bg:"#243b52", fg:"#9cc4e8"},
  "와이쓰리":   {bg:"#4a2c3c", fg:"#e6a9c5"},
  "프리터프":   {bg:"#4a3d1f", fg:"#e0bc6c"},
  "키그린":     {bg:"#2c4030", fg:"#a9d2ae"},
  "오지에스공업": {bg:"#33362f", fg:"#c2c4b8"},
  "지에스티지": {bg:"#2f3a3a", fg:"#a9c9c9"},
  "동림이엔씨": {bg:"#3a332f", fg:"#c9b9a9"},
  "금룡":       {bg:"#3a2f2c", fg:"#d2a99c"},
};

const specInput = document.getElementById('specInput');
const resultsEl = document.getElementById('results');
const sectionLabel = document.getElementById('section-label');
const dimSvg = document.getElementById('dimSvg');

function parseNums(str){
  return str
    .replace(/[Tt]/g,'')
    .split(/[x×X*\/,\s]+/)
    .map(s=>s.trim())
    .filter(s=>s.length>0)
    .map(Number)
    .filter(n=>!isNaN(n) && n>0);
}

function dimDiagram(nums){
  if(!nums || nums.length===0){ dimSvg.innerHTML=''; return; }
  const w = nums[0]||0, d = nums[1]||0, t = nums[2]||0;
  let svg = '';
  const stroke = 'var(--moss-dim)';
  if(nums.length>=2){
    svg += `<rect x="10" y="8" width="34" height="26" fill="none" stroke="${stroke}" stroke-width="1.4"/>`;
    svg += `<line x1="10" y1="4" x2="44" y2="4" stroke="${stroke}" stroke-width="1"/>`;
    svg += `<line x1="6" y1="8" x2="6" y2="34" stroke="${stroke}" stroke-width="1"/>`;
  } else {
    svg += `<rect x="10" y="8" width="34" height="26" fill="none" stroke="${stroke}" stroke-width="1" stroke-dasharray="2,2"/>`;
  }
  if(nums.length>=3 || nums.length===1){
    const tVal = nums.length>=3 ? t : nums[0];
    svg += `<rect x="52" y="14" width="10" height="14" fill="var(--moss-dim)" opacity="0.5"/>`;
    svg += `<text x="57" y="46" font-size="8" fill="var(--ink-dim)" text-anchor="middle" font-family="JetBrains Mono">T</text>`;
  }
  dimSvg.innerHTML = svg;
}

function certTag(name){
  if(name==='우수제품'){
    return `<div class="stamp">우수<br>제품</div>`;
  }
  return '';
}

function renderCard(item, diffTag){
  const cc = COMPANY_COLOR[item.company] || {bg:'#333',fg:'#ccc'};
  const stampHtml = item.cert.includes('우수제품') ? certTag('우수제품') : '';
  const dimsStr = item.dims.join(' × ');
  const otherCerts = item.cert.filter(c=>c!=='우수제품');
  return `
  <div class="card ${diffTag!==undefined?'near':''}">
    ${diffTag!==undefined ? `<div class="diff-badge">오차 ${diffTag}mm</div>` : ''}
    ${stampHtml}
    <div class="card-main">
      <div class="card-top">
        <div class="prod-name">${item.name}</div>
        <div class="prod-spec">${dimsStr} mm</div>
      </div>
      <div class="tag-row">
        <span class="company-tag" style="background:${cc.bg};color:${cc.fg}">${item.company}</span>
        ${item.type.map(t=>`<span class="tag">${t}</span>`).join('')}
        ${otherCerts.map(t=>`<span class="tag">${t}</span>`).join('')}
      </div>
      <div class="meta-row">
        ${item.material ? `<span>소재 <b>${item.material}</b></span>` : ''}
        ${item.id ? `<span>식별번호 <b>${item.id}</b></span>` : ''}
      </div>
      ${item.note ? `<div class="note">${item.note}</div>` : ''}
    </div>
  </div>`;
}

function sortedCopy(arr){ return [...arr].sort((a,b)=>a-b); }
function close(a,b,tol){ return Math.abs(a-b) <= tol; }

function matchExact(nums, item){
  const tol = 0.5;
  const d = item.dims;
  if(nums.length===3){
    const inFoot = sortedCopy(nums.slice(0,2));
    const dFoot = sortedCopy(d.slice(0,2));
    return close(inFoot[0],dFoot[0],tol) && close(inFoot[1],dFoot[1],tol) && close(nums[2],d[2],tol);
  }
  if(nums.length===2){
    const inFoot = sortedCopy(nums);
    const dFoot = sortedCopy(d.slice(0,2));
    return close(inFoot[0],dFoot[0],tol) && close(inFoot[1],dFoot[1],tol);
  }
  if(nums.length===1){
    return close(nums[0], d[2], tol);
  }
  return false;
}

function diffScore(nums, item){
  const d = item.dims;
  if(nums.length===3){
    const inFoot = sortedCopy(nums.slice(0,2));
    const dFoot = sortedCopy(d.slice(0,2));
    return Math.abs(inFoot[0]-dFoot[0]) + Math.abs(inFoot[1]-dFoot[1]) + Math.abs(nums[2]-d[2]);
  }
  if(nums.length===2){
    const inFoot = sortedCopy(nums);
    const dFoot = sortedCopy(d.slice(0,2));
    return Math.abs(inFoot[0]-dFoot[0]) + Math.abs(inFoot[1]-dFoot[1]);
  }
  if(nums.length===1){
    return Math.abs(nums[0]-d[2]);
  }
  return 9999;
}

function renderBrowse(){
  sectionLabel.textContent = `전체 제품 (${DATA.length})`;
  const groups = {};
  DATA.forEach(item=>{
    if(!groups[item.company]) groups[item.company]=[];
    groups[item.company].push(item);
  });
  let html = '<div class="browse-groups">';
  Object.keys(groups).forEach(company=>{
    const cc = COMPANY_COLOR[company] || {bg:'#333',fg:'#ccc'};
    const items = groups[company];
    html += `<div class="browse-group">
      <div class="browse-head">
        <span class="company-tag" style="background:${cc.bg};color:${cc.fg}">${company}</span>
        <span class="browse-count">${items.length}종</span>
      </div>
      <div class="browse-chips">
        ${items.map(it=>`<span class="chip"><b>${it.name}</b> ${it.dims.join('×')}</span>`).join('')}
      </div>
    </div>`;
  });
  html += '</div>';
  resultsEl.innerHTML = html;
}

function renderQuery(query){
  const nums = parseNums(query);
  dimDiagram(nums);

  if(nums.length===0){
    renderBrowse();
    return;
  }

  const exact = DATA.filter(item=>matchExact(nums,item));

  if(exact.length>0){
    sectionLabel.textContent = `일치하는 제품 (${exact.length})`;
    resultsEl.innerHTML = exact.map(item=>renderCard(item)).join('');
    return;
  }

  sectionLabel.textContent = `일치하는 제품 (0)`;
  resultsEl.innerHTML = `<div class="empty-msg">입력하신 규격과 정확히 일치하는 제품이 없습니다.</div>`;
}

specInput.addEventListener('input', (e)=>renderQuery(e.target.value));
renderBrowse();
dimDiagram([]);
</script>
</body>
</html>
